# SSH config khusus Bali servers
# Tujuan      : ProxyCommand via server01 Cikeas, reuse 1 SSH connection (ControlMaster)
# Caller      : ansible_ssh_common_args di bali_servers.yml
# Side Effects: Semua tunnel Bali share 1 TCP connection ke server01 → tidak flood fail2ban
# Prereq      : Jalankan dulu: ssh-establish-jump.sh untuk buka ControlMaster ke server01

Host 10.18.200.*
    # ControlMaster=auto → reuse socket /tmp/ansible-jump-cikeas01 kalau ada, buat kalau belum
    ProxyCommand    sshpass -p Bug4Root26 ssh -o ControlMaster=auto -o ControlPath=/tmp/ansible-jump-cikeas01 -o ControlPersist=300s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p bhayangkara@10.200.168.41
    StrictHostKeyChecking   no
    UserKnownHostsFile      /dev/null
    ServerAliveInterval     10
    ServerAliveCountMax     3
