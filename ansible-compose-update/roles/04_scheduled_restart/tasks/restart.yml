---
# ═══════════════════════════════════════════════════════════════════════════════
# Task File  : restart.yml (dipanggil dari playbook PHASE 2 via include_role)
# Tujuan     : Rolling restart per node dengan jeda 2 menit antar node
# Caller     : playbooks/scheduled_restart.yml (PHASE 2)
# Dependensi : nodes_to_modify (cached dari PHASE 1), compose_base_dir
# Side Effects: docker-compose down & up pada tiap node
# ═══════════════════════════════════════════════════════════════════════════════

# ─── Parse node list ─────────────────────────────────────────────────────────
- name: Parse daftar node dari inventory
  ansible.builtin.set_fact:
    node_list: "{{ compose_nodes.split(',') }}"

# ─── Tentukan nodes yang perlu di-restart ────────────────────────────────────
- name: Gunakan nodes_to_modify dari PHASE 1 (fallback ke semua node)
  ansible.builtin.set_fact:
    nodes_to_restart: "{{ nodes_to_modify | default(node_list) }}"

- name: "🔄 Nodes yang akan di-restart di {{ inventory_hostname }}"
  ansible.builtin.debug:
    msg: "{{ inventory_hostname }} ({{ ansible_host }}) → {{ nodes_to_restart | join(', ') }}"

# ─── Skip jika tidak ada yang perlu restart ──────────────────────────────────
- name: Skip restart jika tidak ada node yang diubah
  ansible.builtin.debug:
    msg: "✅ {{ inventory_hostname }} | Tidak ada node yang perlu di-restart"
  when: nodes_to_restart | length == 0

# ─── Rolling restart per node (jeda 2 menit antar node) ──────────────────────
- name: "🔄 Rolling restart per node"
  ansible.builtin.include_tasks: restart_single_node.yml
  loop: "{{ nodes_to_restart }}"
  loop_control:
    loop_var: restart_node
    extended: true
  when: nodes_to_restart | length > 0
